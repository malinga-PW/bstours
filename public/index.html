<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <title>BSTours.lk - Sri Lanka Travel & Buddhist Pilgrimage Tours</title>
  <meta name="author" content="BSTours.lk">
  <meta name="description" content="BSTours.lk - Sri Lanka based travel agency specializing in Buddhist pilgrimage tours to India (Dambadiwa), Thailand, Bangkok and Sri Lanka tour packages.">
  <meta name="keywords" content="BSTours, Sri Lanka tours, Buddhist pilgrimage, Dambadiwa, India tour, Thailand tour, Bangkok travel">
  <meta name="robots" content="INDEX,FOLLOW">

  <!-- Mobile Specific Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Favicon -->
  <link rel="icon" type="image/gif" sizes="16x16" href="/bstours-favicon.gif">
  <link rel="icon" type="image/gif" sizes="32x32" href="/bstours-favicon.gif">
  <link rel="apple-touch-icon" href="/bstours-favicon.gif">

  <!--==============================
	  Google Fonts
	============================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Manrope:wght@200..800&family=Montez&display=swap"
    rel="stylesheet">

  <!--==============================
	    All CSS File
	============================== -->
  <!-- Bootstrap -->
  <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
  <!-- Fontawesome Icon -->
  <link rel="stylesheet" href="/assets/css/fontawesome.min.css">
  <!-- Magnific Popup -->
  <link rel="stylesheet" href="/assets/css/magnific-popup.min.css">

  <!-- Swiper css -->
  <link rel="stylesheet" href="/assets/css/swiper-bundle.min.css">

  <!-- Theme Custom CSS -->
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    /* Google Translate Widget Custom Styles */
    .goog-te-banner-frame.skiptranslate,
    .goog-te-gadget-icon,
    .VIpgJd-ZVi9od-ORHb-OEVmcd,
    .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
    #goog-gt-tt {
      display: none !important;
    }
    
    /* Hide google translate frame globally */
    body {
      top: 0 !important;
      position: static !important;
    }
    .skiptranslate,
    .goog-te-banner-frame {
      display: none !important;
    }
    
    /* Color Reorganization */
    .header-top {
      background-color: #ffffff !important;
      padding-top: 2px !important;
      padding-bottom: 2px !important;
    }
    .header-top .header-links li,
    .header-top .header-links li a,
    .header-top .header-links li i,
    .header-top .header-links li span,
    .header-top button {
      color: #005274 !important;
    }
    .header-top .header-links li {
      padding-top: 2px !important;
      padding-bottom: 2px !important;
    }

    /* Orange logo background to White */
    .logo-bg {
      background-color: #ffffff !important;
    }

    /* White Menu Area to Blue */
    .menu-area {
      background-color: #005274 !important;
      min-height: 92px; /* Restore original header height */
      display: flex;
      align-items: center;
    }
    
    /* Menu Text to White, normal text with underline on hover */
    .main-menu > ul > li > a {
      color: #ffffff !important;
      background-color: transparent !important;
      padding: 10px 15px !important;
      display: inline-block;
      line-height: 1;
      font-weight: 600;
      position: relative;
      text-decoration: none;
    }
    
    /* Underline effect on hover/active */
    .main-menu > ul > li > a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: 0;
      left: 50%;
      background-color: var(--theme-color);
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }
    
    .main-menu > ul > li > a:hover::after,
    .main-menu > ul > li > a.active::after {
      width: 80%;
    }
    
    .main-menu > ul > li > a:hover,
    .main-menu > ul > li > a.active {
      color: var(--theme-color) !important;
      background-color: transparent !important;
    }

    .sticky-wrapper.sticky .menu-area {
      background-color: #005274 !important;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    .header-button .th-btn {
      background-color: #ffffff !important;
      color: #005274 !important;
      border: 1px solid #ffffff !important;
      padding: 12px 24px !important;
      border-radius: 50px !important;
      font-weight: bold;
    }
    .header-button .th-btn:hover {
      background-color: var(--theme-color) !important;
      color: #ffffff !important;
      border-color: var(--theme-color) !important;
    }
    
    body {
      top: 0px !important;
    }
    .goog-te-gadget {
      color: transparent !important;
      font-size: 0px !important;
    }
    .goog-te-combo {
      padding: 8px 12px;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #fff;
      background-color: var(--theme-color);
      outline: none;
      cursor: pointer;
      font-weight: 500;
    }
    .goog-te-combo:hover {
      background-color: var(--title-color);
    }
    .goog-te-combo option {
      background-color: #fff;
      color: #333;
    }
  </style>

</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'si', includedLanguages: 'en,si,ta,ja,th,hi', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
    }
  </script>
  <style>
    #google_translate_element {
      display: none !important;
    }
  </style>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>

</html>
